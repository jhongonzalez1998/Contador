<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Jhon & Keyla | Contador 💍</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;600&family=Playwrite+IE:wght@100&display=swap" rel="stylesheet">
    <style>
        :root { --arena: #c2a36a; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: white; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* Apuntamos al nuevo nombre simple */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('boda.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        .container { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .titulo { font-family: 'Playwrite IE', cursive; font-size: 1.5rem; color: var(--arena); margin-bottom: 10px; }
        .nombres { font-weight: 100; text-transform: uppercase; letter-spacing: 10px; font-size: 1rem; margin-bottom: 50px; }
        .countdown-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; width: 100%; max-width: 400px; }
        .number { font-size: 4.5rem; font-weight: 100; line-height: 1; display: block; }
        .label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--arena); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="titulo">Faltan solo...</div>
        <div class="nombres">Jhon & Keyla</div>
        <div class="countdown-grid">
            <div class="box"><span class="number" id="days">00</span><span class="label">Días</span></div>
            <div class="box"><span class="number" id="hours">00</span><span class="label">Horas</span></div>
            <div class="box"><span class="number" id="minutes">00</span><span class="label">Minutos</span></div>
            <div class="box"><span class="number" id="seconds">00</span><span class="label">Segundos</span></div>
        </div>
    </div>
    <script>
        function up() {
            const t = new Date(2026, 10, 7, 16, 0, 0).getTime();
            const n = new Date().getTime();
            const d = t - n;
            const days = Math.floor(d/(1000*60*60*24));
            const hours = Math.floor((d%(1000*60*60*24))/(1000*60*60));
            const mins = Math.floor((d%(1000*60*60))/(1000*60));
            const secs = Math.floor((d%(1000*60))/1000);
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("minutes").innerText = mins;
            document.getElementById("seconds").innerText = secs;
        }
        setInterval(up, 1000); up();
    </script>
</body>
</html>
