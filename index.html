<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>La Cuenta Regresiva | Jhon & Keyla 💍</title>
    
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;400;600&family=Playwrite+IE:wght@100&display=swap" rel="stylesheet">

    <style>
        :root { 
            --arena: #c2a36a; /* Nuevo color arena elegante */
            --blanco: #ffffff;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background-color: #000; color: var(--blanco);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* FONDO REFORZADO */
        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-image: url('foto_contador.jpg?v=1') !important;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-color: #000;
            z-index: -1;
        }

        .background::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.55); /* Un poco más oscuro para que resalte el arena */
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .titulo {
            font-family: 'Playwrite IE', cursive;
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            color: var(--arena); /* Título en color arena */
            margin-bottom: 10px;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.5);
        }

        .nombres {
            font-weight: 100;
            text-transform: uppercase;
            letter-spacing: 12px;
            font-size: clamp(0.9rem, 4vw, 1.3rem);
            margin-bottom: 60px;
            color: var(--blanco);
            opacity: 0.9;
        }

        /* CONTADOR */
        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px 20px;
            max-width: 600px;
            width: 100%;
        }

        .box { text-align: center; }

        .number {
            font-size: clamp(4.5rem, 18vw, 8rem);
            font-weight: 100;
            line-height: 0.9;
            color: var(--blanco);
            display: block;
        }

        .label {
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 15px;
            color: var(--arena); /* Etiquetas (Días, Horas...) en arena */
            font-weight: 600;
        }

        .footer-date {
            position: absolute;
            bottom: 40px;
            font-weight: 200;
            letter-spacing: 6px;
            font-size: 0.75rem;
            opacity: 0.8;
            text-transform: uppercase;
            color: var(--arena); /* Fecha inferior en arena */
        }

        @media (min-width: 768px) {
            .countdown-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="container">
        <div class="titulo">Faltan solo...</div>
        <div class="nombres">Jhon & Keyla</div>

        <div class="countdown-grid">
            <div class="box">
                <span class="number" id="days">00</span>
                <span class="label">Días</span>
            </div>
            <div class="box">
                <span class="number" id="hours">00</span>
                <span class="label">Horas</span>
            </div>
            <div class="box">
                <span class="number" id="minutes">00</span>
                <span class="label">Minutos</span>
            </div>
            <div class="box">
                <span class="number" id="seconds">00</span>
                <span class="label">Segundos</span>
            </div>
        </div>

        <div class="footer-date">07 . NOV . 2026 | 16:00H</div>
    </div>

    <script>
        function updateCountdown() {
            const targetDate = new Date(2026, 10, 7, 16, 0, 0).getTime();
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.querySelector(".container").innerHTML = "<h1 style='letter-spacing:10px; font-weight:100; color:#c2a36a;'>¡LLEGÓ EL DÍA! 💍</h1>";
                clearInterval(timer);
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }

        const timer = setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
